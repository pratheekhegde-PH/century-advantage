<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .fb { background:#fff;border:1px solid var(--border-1);border-radius:10px;padding:20px 22px;box-shadow:var(--shadow-2);width:640px; }
  .fb-grid { display:grid;grid-template-columns:repeat(4,1fr) auto;gap:14px;align-items:flex-end; }
  .fb-label { font-family:var(--font-display);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ca-coral);margin-bottom:4px;display:block; }
  .fb-input { width:100%;background:var(--bg-2);border:1px solid var(--border-2);border-radius:4px;padding:8px 10px;font-family:var(--font-body);font-size:12px;color:var(--fg-1);box-sizing:border-box; }
  .fb-btn { background:transparent;color:var(--ca-coral);border:1px solid var(--ca-coral);padding:8px 14px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;cursor:pointer; }
</style></head><body>
<div class="col" style="gap:12px;">
  <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Listings filter bar</span>
  <div class="fb">
    <div class="fb-grid">
      <div><label class="fb-label">Type</label><select class="fb-input"><option>All Properties</option></select></div>
      <div><label class="fb-label">BHK</label><select class="fb-input"><option>Any BHK</option></select></div>
      <div><label class="fb-label">Max Budget</label><select class="fb-input"><option>Below ₹1 Cr</option></select></div>
      <div><label class="fb-label">Location</label><select class="fb-input"><option>Hebbal</option></select></div>
      <button class="fb-btn">Reset</button>
    </div>
  </div>
</div>
</body></html>
