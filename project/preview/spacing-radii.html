<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:10px;">
  <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Corner radii</span>
  <div style="display:flex;gap:18px;align-items:flex-end;">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:2px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-xs</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">2px</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:4px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-sm</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">4px</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:6px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-md</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">6px</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:10px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-lg</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">10px</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:16px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-xl</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">16px</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="width:74px;height:74px;background:var(--ca-coral-soft);border:1px solid var(--ca-coral);border-radius:999px;"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--r-pill</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);">999</span>
      </div>
    
  </div>
</div>
</body></html>
