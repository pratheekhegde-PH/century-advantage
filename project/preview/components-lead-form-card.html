<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .lc { width:340px;background:#fff;border:2px solid var(--ca-coral);border-radius:8px;padding:22px;box-shadow:var(--shadow-3); }
  .lc-title { font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--fg-1);margin:0; }
  .lc-sub { font-family:var(--font-body);font-size:12px;color:var(--fg-3);margin:4px 0 18px; }
  .lc-label { font-family:var(--font-display);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ca-coral); }
  .lc-input { width:100%;background:var(--bg-2);border:1px solid var(--border-2);border-radius:4px;padding:9px 12px;font-family:var(--font-body);font-size:13px;color:var(--fg-1);margin-top:5px;margin-bottom:14px;box-sizing:border-box; }
  .lc-btn { width:100%;background:var(--ca-coral);color:#fff;padding:11px;border:none;border-radius:4px;font-family:var(--font-display);font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:6px; }
</style></head><body>
<div style="display:flex;gap:24px;align-items:flex-start;">
  <div class="lc">
    <h3 class="lc-title">Schedule a Site Visit</h3>
    <p class="lc-sub">A Century advisor will respond within 4 hours.</p>
    <label class="lc-label">Full Name</label>
    <input class="lc-input" value="Aarav Kapoor" />
    <label class="lc-label">Mobile</label>
    <input class="lc-input" value="+91 98xxx xxxxx" />
    <button class="lc-btn">Submit Request</button>
  </div>
  <div class="col" style="gap:8px;padding-top:6px;max-width:280px;">
    <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Sticky lead-capture card</span>
    <p style="font-family:var(--font-body);font-size:13px;color:var(--fg-2);">Sits in the right column of property detail pages. 2px coral border + lifted shadow. Labels in coral eyebrow style; copy in service-oriented voice.</p>
  </div>
</div>
</body></html>
