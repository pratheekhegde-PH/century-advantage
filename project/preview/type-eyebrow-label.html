<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:28px;">
  <div class="col" style="gap:8px;">
    <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Eyebrow — section subtitle</span>
    <span style="font-family:var(--font-display);font-size:12px;line-height:1.4;letter-spacing:.18em;font-weight:500;text-transform:uppercase;color:var(--ca-coral);">Exquisite Handpicked Assets</span>
    <span style="font-family:var(--font-display);font-size:28px;line-height:1.2;font-weight:500;color:var(--fg-1);">Featured Advantage Residences</span>
    <span style="display:inline-block;width:30px;height:2px;background:var(--ca-coral);"></span>
  </div>
  <div class="col" style="gap:6px;">
    <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Label — buttons, nav, form fields</span>
    <div style="display:flex;gap:24px;align-items:center;">
      <span style="font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-1);">Browse Properties</span>
      <span style="font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ca-coral);">List Your Asset</span>
      <span style="font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);">Property Type</span>
    </div>
  </div>
</div>
</body></html>
