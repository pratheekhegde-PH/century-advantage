<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:14px;">
  <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Pairings in use</span>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div style="background:#6440A2;border-radius:10px;padding:18px;color:#fff;">
      <div style="font-family:var(--font-display);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#F9685B;font-weight:500;">A Premium Service</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-.005em;margin-top:6px;">Find Your Perfect Home</div>
      <div style="margin-top:14px;display:inline-block;background:#F9685B;color:#fff;padding:7px 14px;border-radius:4px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;">Browse</div>
    </div>
    <div style="background:#FCFFC8;border-radius:10px;padding:18px;color:#2A1A4D;border:1px solid var(--border-1);">
      <div style="font-family:var(--font-display);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6440A2;font-weight:500;">Owner Programme</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-.005em;margin-top:6px;color:#2A1A4D;">90-Day Mandate</div>
      <div style="margin-top:14px;display:inline-block;background:#6440A2;color:#fff;padding:7px 14px;border-radius:4px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;">Read More</div>
    </div>
    <div style="background:#A1D2F2;border-radius:10px;padding:18px;color:#2A1A4D;">
      <div style="font-family:var(--font-display);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#4A2D7B;font-weight:500;">Site Visit</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-.005em;margin-top:6px;color:#2A1A4D;">Tuesday, 4pm</div>
      <div style="margin-top:14px;display:inline-block;background:#F9685B;color:#fff;padding:7px 14px;border-radius:4px;font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;">Confirm</div>
    </div>
  </div>
</div>
</body></html>
