<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .btn { display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:4px;font-family:var(--font-display);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border:1px solid transparent;cursor:pointer;transition:all 220ms cubic-bezier(.4,0,.2,1); }
  .btn-primary { background:var(--ca-coral);color:#fff; }
  .btn-secondary { background:transparent;color:var(--ca-coral);border-color:var(--ca-coral); }
  .btn-tertiary { background:transparent;color:var(--ca-coral);padding:8px 4px; }
  .btn-purple { background:var(--ca-purple);color:#fff; }
  .btn-ghost-dark { background:transparent;color:#fff;border-color:rgba(255,255,255,.6); }
  .btn-compact { padding:8px 16px;font-size:12px; }
</style></head><body>
<div class="col" style="gap:18px;">
  <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Buttons — alternate variants</span>
  <div class="row" style="gap:14px;">
    <button class="btn btn-purple">Investor Portfolio</button>
    <button class="btn btn-purple btn-compact">Download Brief</button>
  </div>
  <div class="row" style="gap:14px;padding:14px 16px;background:var(--ca-ink);border-radius:8px;">
    <button class="btn btn-ghost-dark">Continue</button>
    <button class="btn btn-ghost-dark btn-compact">Cancel</button>
  </div>
</div>
</body></html>
