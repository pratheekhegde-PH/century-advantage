<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:14px;">
  <span class="t-caption" style="color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;">Elevation — soft, warm-tinted</span>
  <div style="display:flex;gap:36px;align-items:center;padding:24px 8px;">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-1);"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--shadow-1</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-2);"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--shadow-2</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-3);"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--shadow-3</span>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-4);"></div>
        <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--shadow-4</span>
      </div>
    
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:var(--shadow-focus);border:1px solid var(--border-1);"></div>
      <span style="font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--fg-1);">--shadow-focus</span>
    </div>
  </div>
</div>
</body></html>
